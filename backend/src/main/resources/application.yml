spring:
  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
      encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

sweetbook:
  api:
    key: ${SWEETBOOK_API_KEY:}
    base-url: https://api-sandbox.sweetbook.com/v1

file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}

openai:
  api:
    key: ${OPENAI_API_KEY:}

server:
  port: 8080
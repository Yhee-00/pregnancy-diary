spring:
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/pregnancy_diary?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&authPlugins=mysql_native_password}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
      encoding: UTF-8

sweetbook:
  api:
    key: ${SWEETBOOK_API_KEY:}
    base-url: https://api-sandbox.sweetbook.com/v1

server:
  port: 8080